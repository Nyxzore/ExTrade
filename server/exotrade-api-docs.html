<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExoTrade API Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2a2a2a;
            --text-normal: #dcddde;
            --text-muted: #999;
            --text-faint: #666;
            --accent: #7f6df2;
            --accent-hover: #998df7;
            --border: #3e3e3e;
            --code-bg: #161616;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-primary);
            color: var(--text-normal);
            font-family: var(--font-sans);
            overflow: hidden;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graph-container:active { cursor: grabbing; }

        /* Sidebar / Detail Pane */
        #side-pane {
            position: fixed;
            right: 0;
            top: 0;
            width: 450px;
            height: 100%;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }

        #side-pane.open { transform: translateX(0); }

        .pane-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .pane-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* Typography inside Pane */
        h1 { font-size: 24px; margin: 0 0 16px; color: var(--accent); }
        h2 { font-size: 18px; margin: 32px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        p { line-height: 1.6; color: var(--text-normal); font-size: 14px; }

        .endpoint-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent-hover);
            margin-bottom: 16px;
        }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--text-faint); border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .param-name { font-family: var(--font-mono); color: var(--accent); }

        pre { background: var(--code-bg); padding: 16px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
        code { font-family: var(--font-mono); font-size: 12px; }

        /* Graph Elements Styling */
        .node circle { stroke: var(--bg-primary); stroke-width: 2px; }
        .node text { font-size: 10px; fill: var(--text-muted); pointer-events: none; text-anchor: middle; }
        .link { stroke: var(--border); stroke-opacity: 0.6; stroke-width: 1px; }

        /* Overlay UI */
        .ui-overlay {
            position: fixed;
            top: 24px;
            left: 24px;
            pointer-events: none;
            z-index: 10;
        }
        .ui-overlay h1 { color: var(--text-normal); margin: 0; font-size: 22px; font-weight: 600; }
        .ui-overlay p { color: var(--text-faint); margin: 4px 0 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

<div class="ui-overlay">
    <h1>ExoTrade API</h1>
    <p>Interactive Architecture Graph</p>
</div>

<div id="graph-container"></div>

<aside id="side-pane">
    <div class="pane-header">
        <div id="pane-title-small" style="font-size: 11px; color: var(--text-faint); text-transform: uppercase;">Documentation</div>
        <button class="close-btn" onclick="closePane()">&times;</button>
    </div>
    <div class="pane-content" id="pane-body">
        <!-- Dynamic Content -->
    </div>
</aside>

<script>
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select("#graph-container")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const container = svg.append("g");

    svg.call(d3.zoom().on("zoom", (event) => {
        container.attr("transform", event.transform);
    }));

    const linkGroup = container.append("g").attr("class", "links");
    const nodeGroup = container.append("g").attr("class", "nodes");

    let simulation;

    async function initGraph() {
        try {
            const response = await fetch('get_graph_data');
            const data = await response.json();

            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = linkGroup.selectAll("line")
                .data(data.links)
                .enter().append("line")
                .attr("class", "link");

            const node = nodeGroup.selectAll(".node")
                .data(data.nodes)
                .enter().append("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (event, d) => showPane(d.id));

            node.append("circle")
                .attr("r", 8)
                .attr("fill", "#7f6df2");

            node.append("text")
                .attr("dy", 20)
                .text(d => d.label);

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("transform", d => `translate(${d.x},${d.y})`);
            });
        } catch (error) {
            console.error("Error loading graph data:", error);
        }
    }

    async function showPane(id) {
        const pane = document.getElementById("side-pane");
        const body = document.getElementById("pane-body");

        body.innerHTML = "<h1>Loading...</h1>";
        pane.classList.add("open");

        try {
            const response = await fetch(`get_note_content?note=${encodeURIComponent(id)}`);
            if (response.ok) {
                const markdown = await response.text();
                body.innerHTML = marked.parse(markdown);
            } else {
                body.innerHTML = `<h1>Error</h1><p>Could not load note: ${id}</p>`;
            }
        } catch (error) {
            body.innerHTML = `<h1>Error</h1><p>${error.message}</p>`;
        }
    }

    function closePane() {
        document.getElementById("side-pane").classList.remove("open");
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    window.addEventListener("resize", () => {
        svg.attr("width", window.innerWidth).attr("height", window.innerHeight);
    });

    initGraph();

</script>

</body>
</html>
